<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Generator</title>
    <link rel="shortcut icon" href="image/quotation.png" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-gradient bg-black min-vh-100 d-flex flex-column">
    <header>
      <h4
        class="text-white text-center display-6 fs-3 p-2 bg-gradient bg-secondary"
      >
        30 Days 30 JS Projects Challenge Day 29
      </h4>
    </header>
    <main class="flex-grow-1 d-flex align-items-center">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-6">
            <div
              class="bg-gradient bg-secondary p-3 rounded-3 d-flex flex-column align-content-between"
            >
              <h5
                class="text-white text-center font-monospace border-bottom border-white rounded-1 mb-4"
              >
                Quote Generator
              </h5>
              <p
                class="text-center text-white p-1 rounded bg-dark bg-gradient"
                style="
                  position: relative;
                  width: 100%;
                  max-width: 50rem;
                  min-height: 4rem;
                "
                id="quote"
              ></p>
              <p
                class="text-center text-white mt-2 rounded bg-black bg-gradient p-1 w-25"
              >
                <i id="author">-Name</i>
              </p>

              <button class="btn btn-dark my-3" id="btn">Generate</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
